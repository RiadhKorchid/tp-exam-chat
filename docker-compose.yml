version: '3.8'

services:
  backend:
    build: ./backend
    container_name: chat-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: chat-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
