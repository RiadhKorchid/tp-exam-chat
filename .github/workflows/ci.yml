name: CI/CD — Chat App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────
  # JOB 1 : Test Backend
  # ──────────────────────────────────────────
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests
        working-directory: backend
        run: npm test

      - name: Check API syntax
        working-directory: backend
        run: node --check server.js && echo "✅ Syntax OK"


  # ──────────────────────────────────────────
  # JOB 2 : Test Frontend
  # ──────────────────────────────────────────
  test-frontend:
    name: 🧪 Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check index.html exists
        run: |
          if [ -f frontend/index.html ]; then
            echo "✅ frontend/index.html found"
          else
            echo "❌ frontend/index.html missing"
            exit 1
          fi

      - name: Check required HTML elements
        run: |
          grep -q "pseudo" frontend/index.html && echo "✅ Pseudo field found"
          grep -q "messages" frontend/index.html && echo "✅ Messages area found"
          grep -q "sendMessage" frontend/index.html && echo "✅ Send function found"
          grep -q "/api/messages" frontend/index.html && echo "✅ API calls found"


  # ──────────────────────────────────────────
  # JOB 3 : Build Docker Images
  # ──────────────────────────────────────────
  build:
    name: 🐳 Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t chat-backend:latest ./backend

      - name: Build frontend image
        run: docker build -t chat-frontend:latest ./frontend

      - name: Smoke test backend container
        run: |
          docker run -d -p 3001:3001 --name backend-smoke chat-backend:latest
          sleep 6
          curl -f http://localhost:3001/ && echo "✅ Backend health check passed"
          curl -f http://localhost:3001/api/messages && echo "✅ GET /api/messages OK"
          docker stop backend-smoke
          docker rm backend-smoke


  # ──────────────────────────────────────────
  # JOB 4 : Deploy Backend → Render
  # ──────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          echo "Triggering Render deployment..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Render deploy triggered"


  # ──────────────────────────────────────────
  # JOB 5 : Deploy Frontend → Vercel
  # ──────────────────────────────────────────
  deploy-frontend:
    name: 🚀 Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel Production
        working-directory: frontend
        run: |
          vercel deploy --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}